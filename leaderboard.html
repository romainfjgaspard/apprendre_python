<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Python Quest — Leaderboard</title>
<link rel="stylesheet" href="style.css">
<style>
  .lb-container {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
  }
  .lb-container h1 {
    text-align: center;
    font-family: var(--font-pixel);
    font-size: 16px;
    color: var(--accent);
    margin-bottom: 24px;
  }
  .lb-back {
    display: inline-block;
    margin-bottom: 16px;
  }
  .lb-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .lb-table {
    width: 100%;
    border-collapse: collapse;
  }
  .lb-table th, .lb-table td {
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .lb-table th {
    color: var(--accent);
    font-size: 12px;
    text-transform: uppercase;
  }
  .lb-table tr:hover {
    background: var(--bg-hover);
  }
  .lb-rank {
    font-family: var(--font-pixel);
    font-size: 12px;
    color: var(--text-dim);
  }
  .lb-rank.gold { color: #ffd700; }
  .lb-rank.silver { color: #c0c0c0; }
  .lb-rank.bronze { color: #cd7f32; }
  .lb-name { color: var(--green); font-weight: 700; }
  .lb-pokemon { color: var(--cyan); }
  .lb-level { color: var(--text-dim); font-size: 12px; }
  .lb-xp { color: var(--accent); }
  .lb-chapters { color: var(--text-dim); font-size: 13px; }
  .lb-empty {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
  }
  .lb-loading {
    text-align: center;
    padding: 40px;
    color: var(--cyan);
  }
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HCG77H3QXB"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-HCG77H3QXB');
</script>
</head>
<body>
  <div class="lb-container">
    <div class="lb-toolbar">
      <a href="index.html" class="btn btn-small lb-back">← Retour au jeu</a>
      <button id="btn-refresh" class="btn btn-small">🔄 Rafraîchir</button>
    </div>
    <h1>🏆 Leaderboard</h1>
    <div id="lb-content" class="lb-loading">Chargement...</div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module">
    const LEVELS = [
      [0,    "🥚 Œuf"],
      [50,   "⚡ Pichu"],
      [150,  "⚡ Pikachu"],
      [300,  "⚡ Raichu"],
      [500,  "🔥 Dracaufeu"],
      [750,  "🐉 Dracolosse"],
      [1000, "🌟 Mewtwo"],
      [1500, "🏆 Maître Pokémon"],
    ];

    function getLevel(xp) {
      for (let i = LEVELS.length - 1; i >= 0; i--) {
        if (xp >= LEVELS[i][0]) return LEVELS[i][1];
      }
      return LEVELS[0][1];
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s || "";
      return d.innerHTML;
    }

    async function renderLeaderboard() {
      const container = document.getElementById("lb-content");
      container.className = "lb-loading";
      container.innerHTML = "Chargement...";

      const ok = await window.initFirebase();
      if (!ok) {
        container.className = "";
        container.innerHTML = `<div class="lb-empty">
          <p>Firebase non configuré.</p>
          <p style="margin-top:8px;font-size:13px;color:var(--text-dim)">
            Ajoute la config Firebase dans <code>firebase.js</code> pour activer le leaderboard.
          </p>
        </div>`;
        return;
      }

      const players = await window.listAllPlayers();
      container.className = "";

      if (players.length === 0) {
        container.innerHTML = `<div class="lb-empty">Aucun joueur pour l'instant — sois le premier à finir un chapitre !</div>`;
        return;
      }

      let html = `<table class="lb-table">
        <thead><tr>
          <th>#</th>
          <th>Joueur</th>
          <th>Pokémon (niveau)</th>
          <th>XP</th>
          <th>Chapitres</th>
        </tr></thead><tbody>`;

      players.forEach((p, i) => {
        const rankClass = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
        const medals = ["🥇", "🥈", "🥉"];
        const rankText = i < 3 ? medals[i] : String(i + 1);
        const chaptersDone = Array.isArray(p.chapters_done) ? p.chapters_done.length : 0;
        const level = getLevel(p.xp || 0);

        html += `<tr>
          <td class="lb-rank ${rankClass}">${rankText}</td>
          <td class="lb-name">${escapeHtml(p.name)}</td>
          <td>
            <span class="lb-pokemon">${escapeHtml(p.starter_pokemon || "—")}</span>
            <span class="lb-level"> ${escapeHtml(level)}</span>
          </td>
          <td class="lb-xp">${p.xp || 0} XP</td>
          <td class="lb-chapters">${chaptersDone}/26</td>
        </tr>`;
      });

      html += "</tbody></table>";
      container.innerHTML = html;
    }

    document.getElementById("btn-refresh").addEventListener("click", renderLeaderboard);

    renderLeaderboard();
  </script>
</body>
</html>
